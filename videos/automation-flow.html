<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Endurance Group – Automation in Action</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#0a0a10; display:flex; align-items:center; justify-content:center; overflow:hidden; }
#stage {
  width:min(100vw, 177.8vh); aspect-ratio:16/9;
  background:radial-gradient(120% 120% at 50% 0%, #14121c 0%, #0a0a10 60%);
  position:relative; overflow:hidden;
  font-family:'Raleway',sans-serif;
}
canvas { position:absolute; inset:0; z-index:0; }
#grid {
  position:absolute; inset:0; z-index:1;
  background-image:
    linear-gradient(rgba(101,182,174,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(101,182,174,0.06) 1px, transparent 1px);
  background-size:52px 52px;
  animation:gp 24s linear infinite;
}
@keyframes gp { to { background-position:52px 52px; } }

.head {
  position:absolute; top:7%; left:0; right:0; z-index:5; text-align:center;
}
.head .badge {
  font-size:clamp(8px,1.25vw,12px); font-weight:600; letter-spacing:.22em;
  text-transform:uppercase; color:#65B6AE;
}
.head .ttl {
  margin-top:6px; font-size:clamp(13px,2.4vw,26px); font-weight:700; color:#fff;
}
.head .ttl em { color:#C45E89; font-style:normal; }

/* pipeline */
.pipe { position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); z-index:4;
  display:flex; align-items:center; justify-content:center;
  gap:clamp(6px,1.6vw,26px); padding:0 5%; }
.node { position:relative; display:flex; flex-direction:column; align-items:center;
  width:clamp(52px,11vw,128px); }
.disc {
  width:clamp(40px,7vw,72px); height:clamp(40px,7vw,72px); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,0.03); border:2px solid rgba(255,255,255,0.14);
  color:rgba(255,255,255,0.5);
  transition:border-color .35s ease, color .35s ease, background .35s ease, box-shadow .35s ease, transform .35s ease;
}
.disc svg { width:48%; height:48%; }
.node.lit .disc {
  border-color:var(--ac); color:#fff; background:rgba(255,255,255,0.06);
  box-shadow:0 0 0 4px color-mix(in srgb, var(--ac) 22%, transparent), 0 0 26px color-mix(in srgb, var(--ac) 55%, transparent);
  transform:scale(1.08);
}
.node .lbl {
  margin-top:10px; font-size:clamp(8px,1.15vw,13px); font-weight:600; letter-spacing:.02em;
  color:rgba(255,255,255,0.45); text-align:center; line-height:1.25;
  transition:color .35s ease;
}
.node.lit .lbl { color:#fff; }
.node .tick {
  position:absolute; top:-6px; right:18%; width:clamp(14px,2vw,20px); height:clamp(14px,2vw,20px);
  border-radius:50%; background:var(--ac); display:flex; align-items:center; justify-content:center;
  opacity:0; transform:scale(.4); transition:opacity .3s ease, transform .3s ease;
}
.node .tick svg { width:60%; height:60%; }
.node.done .tick { opacity:1; transform:scale(1); }

/* connectors sit behind nodes, drawn between them */
.link { flex:1; height:3px; position:relative; min-width:clamp(8px,2vw,40px);
  background:rgba(255,255,255,0.10); border-radius:3px; overflow:hidden; }
.link .fill { position:absolute; inset:0; width:0; border-radius:3px;
  background:linear-gradient(90deg, #C45E89, #65B6AE); transition:width .5s ease; }
.link.on .fill { width:100%; }

/* moving packet */
.packet {
  position:absolute; top:50%; left:0; z-index:6;
  width:clamp(12px,1.8vw,18px); height:clamp(12px,1.8vw,18px); border-radius:50%;
  background:#fff; box-shadow:0 0 14px 4px rgba(196,94,137,0.8), 0 0 4px 1px #fff;
  transform:translate(-50%,-50%); opacity:0;
}

.foot {
  position:absolute; bottom:7%; left:0; right:0; z-index:5; text-align:center;
  font-size:clamp(9px,1.4vw,15px); font-weight:300; color:rgba(255,255,255,0.55);
  opacity:0; transition:opacity .6s ease;
}
.foot.show { opacity:1; }
.foot strong { color:#65B6AE; font-weight:600; }

@media (prefers-reduced-motion: reduce) {
  #grid, .packet { animation:none !important; }
}
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div id="grid"></div>

  <div class="head">
    <div class="badge">Automation in action</div>
    <div class="ttl">One lead, <em>zero</em> manual steps</div>
  </div>

  <div class="pipe" id="pipe">
    <div class="node" data-i="0" style="--ac:#C45E89">
      <span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="#0a0a10" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
      <span class="disc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 1 0-16 0"/><circle cx="12" cy="7" r="4"/></svg></span>
      <span class="lbl">New lead</span>
    </div>
    <div class="link"><span class="fill"></span></div>
    <div class="node" data-i="1" style="--ac:#65B6AE">
      <span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="#0a0a10" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
      <span class="disc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>
      <span class="lbl">Enrich</span>
    </div>
    <div class="link"><span class="fill"></span></div>
    <div class="node" data-i="2" style="--ac:#704282">
      <span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="#0a0a10" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
      <span class="disc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1"/></svg></span>
      <span class="lbl">Score vs ICP</span>
    </div>
    <div class="link"><span class="fill"></span></div>
    <div class="node" data-i="3" style="--ac:#C45E89">
      <span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="#0a0a10" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
      <span class="disc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v14c0 1.66 3.58 3 8 3s8-1.34 8-3V5"/><path d="M4 12c0 1.66 3.58 3 8 3s8-1.34 8-3"/></svg></span>
      <span class="lbl">Sync to CRM</span>
    </div>
    <div class="link"><span class="fill"></span></div>
    <div class="node" data-i="4" style="--ac:#65B6AE">
      <span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="#0a0a10" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
      <span class="disc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4z"/></svg></span>
      <span class="lbl">Outreach sent</span>
    </div>
  </div>

  <div class="foot" id="foot">All before anyone opens their laptop. <strong>$750 to build.</strong></div>

  <div class="packet" id="packet"></div>
</div>

<script>
(function () {
  var stage = document.getElementById('stage');
  var pipe = document.getElementById('pipe');
  var packet = document.getElementById('packet');
  var foot = document.getElementById('foot');
  var nodes = Array.prototype.slice.call(pipe.querySelectorAll('.node'));
  var links = Array.prototype.slice.call(pipe.querySelectorAll('.link'));
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ---- ambient drifting dots on canvas ---- */
  var c = document.getElementById('c'), ctx = c.getContext('2d'), W, H, dots = [];
  function resize() {
    W = c.width = stage.offsetWidth; H = c.height = stage.offsetHeight;
  }
  function seed() {
    dots = [];
    var n = Math.round(W / 36);
    for (var i = 0; i < n; i++) {
      dots.push({ x: Math.random() * W, y: Math.random() * H,
        r: Math.random() * 1.6 + 0.4, vx: (Math.random() - 0.5) * 0.18,
        vy: (Math.random() - 0.5) * 0.18, a: Math.random() * 0.4 + 0.1 });
    }
  }
  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < dots.length; i++) {
      var d = dots[i];
      d.x += d.vx; d.y += d.vy;
      if (d.x < 0) d.x = W; if (d.x > W) d.x = 0;
      if (d.y < 0) d.y = H; if (d.y > H) d.y = 0;
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(101,182,174,' + d.a + ')'; ctx.fill();
    }
    if (!reduce) requestAnimationFrame(draw);
  }
  resize(); seed(); draw();
  window.addEventListener('resize', function () { resize(); seed(); });

  /* ---- pipeline sequence ---- */
  // packet is positioned relative to #stage, so measure disc centers in
  // stage coordinates (not pipe coordinates) or it floats above the row.
  function discCenter(node) {
    var sr = stage.getBoundingClientRect(), r = node.querySelector('.disc').getBoundingClientRect();
    return { x: r.left - sr.left + r.width / 2, y: r.top - sr.top + r.height / 2 };
  }

  function reset() {
    nodes.forEach(function (n) { n.classList.remove('lit', 'done'); });
    links.forEach(function (l) { l.classList.remove('on'); });
    foot.classList.remove('show');
    packet.style.opacity = '0';
  }

  // place packet at a disc center
  function moveTo(node, withTransition) {
    var p = discCenter(node);
    packet.style.transition = withTransition ? 'left 0.7s ease, top 0.7s ease' : 'none';
    packet.style.left = p.x + 'px';
    packet.style.top = p.y + 'px';
  }

  var timers = [];
  function clearTimers() { timers.forEach(clearTimeout); timers = []; }

  // STATIC end-state for reduced motion
  if (reduce) {
    nodes.forEach(function (n) { n.classList.add('lit', 'done'); });
    links.forEach(function (l) { l.classList.add('on'); });
    moveTo(nodes[nodes.length - 1], false);
    packet.style.opacity = '1';
    foot.classList.add('show');
    return;
  }

  var STEP = 1150;       // time per node
  function run() {
    clearTimers();
    reset();
    moveTo(nodes[0], false);
    timers.push(setTimeout(function () { packet.style.opacity = '1'; }, 60));

    nodes.forEach(function (node, i) {
      timers.push(setTimeout(function () {
        node.classList.add('lit');
        moveTo(node, true);
        if (i > 0) links[i - 1].classList.add('on');
        // mark previous done as packet leaves it
        if (i > 0) nodes[i - 1].classList.add('done');
      }, 300 + i * STEP));
    });

    // last node done + footer
    var end = 300 + nodes.length * STEP;
    timers.push(setTimeout(function () {
      nodes[nodes.length - 1].classList.add('done');
      foot.classList.add('show');
    }, end));

    // loop
    timers.push(setTimeout(run, end + 2100));
  }

  // recompute packet position on resize mid-loop
  window.addEventListener('resize', function () {
    var lit = nodes.filter(function (n) { return n.classList.contains('lit'); });
    if (lit.length) moveTo(lit[lit.length - 1], false);
  });

  // kick off after layout settles
  setTimeout(run, 400);
})();
</script>
</body>
</html>
